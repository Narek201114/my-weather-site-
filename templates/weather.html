<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Եղանակի Տեսություն</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            padding: 25px;
            flex: 1;
            min-width: 300px;
        }
        #map {
            height: 450px;
            border-radius: 12px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        .search-box button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .search-box button:hover {
            background: #0056b3;
        }
        .weather-info {
            text-align: center;
            margin-top: 20px;
        }
        .temp {
            font-size: 64px;
            font-weight: bold;
            color: #007bff;
            margin: 10px 0;
        }
        .error-msg {
            background: #ffd2d2;
            color: #d8000c;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }
        .forecast-table {
            width: 100%;
            margin-top: 25px;
            border-collapse: collapse;
        }
        .forecast-table th, .forecast-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
