<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Եղանակ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
        }
        .card {
            background: #f8f9fa;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            padding: 30px;
            flex: 1;
            min-width: 320px;
            max-width: 550px;
            box-sizing: border-box;
        }
        #map {
            height: 480px;
            border-radius: 16px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        .search-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .search-box {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 16px;
            background-color: white;
            outline: none;
            transition: all 0.3s;
        }
        .search-box:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.15);
        }
        .btn-search {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-search:hover {
            background: #0056b3;
        }
        .btn-geo {
            background: #28a745;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(40,167,69,0.2);
        }
        .btn-geo:hover {
            background: #218838;
        }
        .weather-info {
            text-align: center;
            margin-top: 20px;
        }
        .city-title {
            font-size: 24px;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 5px;
        }
        .coords-sub {
            font-size: 14px;
            color: #6c757d;
            margin-top: -5px;
            margin-bottom: 20px;
        }
        .weather-icon {
            font-size: 60px;
            margin: 15px 0;
            display: inline-block;
        }
        .temp {
            font-size: 72px;
            font-weight: 700;
            color: #007bff;
            margin: 10px 0;
        }
        .badge-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .badge {
            background: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 14px;
            color: #495057;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .error-msg {
            background: #fff5f5;
            color: #e53e3e;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #fed7d7;
            font-size: 14px;
        }
        .forecast-section {
            margin-top: 35px;
        }
        .forecast-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
        }
        .forecast-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .forecast-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 10px 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .forecast-date {
            font-size: 14px;
            color: #495057;
        }
