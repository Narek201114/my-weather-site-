<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Եղանակի Տեսություն և Քարտեզ</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Նախնական ֆոնը՝ անցումային էֆեկտով */
        body {
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.8s ease-in-out;
        }
        .main-wrapper {
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }
        .container {
            background: rgba(255, 255, 255, 0.92);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            flex: 1;
            text-align: center;
            height: fit-content;
            backdrop-filter: blur(5px);
        }
        .map-container {
            background: rgba(255, 255, 255, 0.92);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            flex: 1.2;
            height: 600px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(5px);
        }
        #map {
            width: 100%;
            height: 100%;
            min-height: 500px;
            border-radius: 12px;
            border: 1px solid #dfe6e9;
            z-index: 1;
        }
        .map-title {
            font-size: 16px;
            color: #2d3436;
            margin-bottom: 10px;
            font-weight: bold;
            text-align: left;
        }
        h1 { color: #2d3436; margin-bottom: 20px; font-size: 24px; }
        
        .search-area {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .search-form {
            display: flex;
            flex: 1;
        }
        .search-form input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #dfe6e9;
            border-radius: 30px 0 0 30px;
            outline: none;
            font-size: 16px;
        }
        .search-form button {
            padding: 12px 25px;
            border: none;
            background: #0984e3;
            color: white;
            border-radius: 0 30px 30px 0;
            cursor: pointer;
            font-size: 16px;
        }
        .geo-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .geo-btn:hover { background: #27ae60; }
        
        .error-msg {
            background: #ff8196;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .weather-info { margin-bottom: 25px; }
        .city { font-size: 28px; font-weight: bold; color: #2d3436; }
        .country { font-size: 16px; color: #636e72; margin-bottom: 10px; }
        .temp { font-size: 64px; font-weight: bold; color: #0984e3; margin: 5px 0; }
        
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }
        .detail-box {
            background: rgba(245, 246, 250, 0.85);
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            color: #2d3436;
            text-align: left;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .forecast-section {
            margin-top: 25px;
            border-top: 2px solid #dfe6e9;
            padding-top: 15px;
        }
        .forecast-title {
            font-size: 18px;
            color: #2d3436;
            margin-bottom: 12px;
            text-align: left;
            font-weight: bold;
        }
        .forecast-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .forecast-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            padding: 10px 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .forecast-date { font-weight: 600; color: #636e72; font-size: 14px; }
        .forecast-code { color: #2d3436; font-size: 14px; flex: 1; text-align: left; padding-left: 15px; }
        .forecast-temp { font-weight: bold; color: #2d3436; font-size: 14px; }
        .min-t { color: #b2bec3; font-weight: normal; margin-left: 6px; }

        @media (max-width: 850px) {
            .main-wrapper { flex-direction: column-reverse; }
            .map-container { height: 400px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="map-container">
        <div class="map-title">🗺️ Սեղմիր քարտեզի ցանկացած կետի վրա՝ եղանակը տեսնելու համար</div>
        <div id="map"></div>
    </div>

    <div class="container">
        <h1>🌤️ Եղանակի Տեսություն</h1>
        
        <div class="search-area">
            <form class="search-form" id="searchForm" method="POST" action="/weather">
                <input type="text" id="cityInput" name="city" placeholder="Գրեք քաղաքի անունը..." required>
                <button type="submit">Փնտրել</button>
            </form>
            <button class="geo-btn" id="geoBtn" title="Իմ տեղադրությունը">🎯</button>
        </div>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <div class="weather-info">
            <div class="city">🏙️ {{ city_name }}</div>
            <div class="country">{{ country_name }}</div>
            <div class="temp">{{ temp }}°C</div>
