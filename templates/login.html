<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Մուտք Համակարգ</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h2 { margin-bottom: 25px; color: #333; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #666; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #007bff; }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #0056b3; }
        .error {
            background: #fff5f5;
            color: #e53e3e;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #fed7d7;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>🔐 Մուտք Համակարգ</h2>
    
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <div class="input-group">
            <label>Օգտանուն</label>
            <input type="text" name="username" placeholder="Մուտքագրեք օգտանունը" required>
        </div>
        <div class="input-group">
            <label>Գաղտնաբառ</label>
            <input type="password" name="password" placeholder="Մուտքագրեք գաղտնաբառը" required>
        </div>
        <button type="submit" class="btn-login">Մուտք Գործել</button>
    </form>
</div>

</body>
</html>
