<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        h2 { color: #333; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Մուտք</h2>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Օգտանուն" required>
            <input type="password" name="password" placeholder="Գաղտնաբառ" required>
            <button type="submit">Մուտք գործել</button>
        </form>
    </div>
</body>
</html>
